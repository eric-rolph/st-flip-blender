name: CUDA smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cuda-smoke:
    name: Required CUDA compute smoke
    runs-on: [self-hosted, linux, x64, nvidia-gpu]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Run real CPU/CUDA parity smoke
        run: >-
          uv run --python 3.12 --extra cuda
          python tools/cuda_smoke.py --require-gpu
          --output cuda-smoke.json
      - name: Upload CUDA smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cuda-smoke
          path: cuda-smoke.json
          if-no-files-found: warn
